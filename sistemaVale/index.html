<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RailWise | Vale - Centro de Operações</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --vale-green: #486e57;
            --vale-gold: #f39c12;
            --dark-bg: #0b0b0b;
            --card-bg: #1a1a1a;
            --danger: #ff4d4d;
            --text-gray: #bdc3c7;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: #fff;
            margin: 0;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.9);
            width: 95%;
            max-width: 1100px;
            border-top: 4px solid var(--vale-green);
            margin: 40px auto;
        }

        .hidden {
            display: none !important;
        }

        /* TELA DE BOAS VINDAS / KPI */
        .home-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .kpi-card {
            background: #222;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #333;
        }

        .kpi-value {
            font-size: 48px;
            font-weight: bold;
            color: var(--vale-gold);
            display: block;
        }

        .kpi-label {
            color: var(--text-gray);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }

        /* MENU INICIAL */
        .main-menu {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .menu-btn {
            flex: 1;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--vale-green);
            background: transparent;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .menu-btn:hover {
            background: var(--vale-green);
            transform: scale(1.02);
        }

        /* LISTA E CARDS */
        .wagon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .wagon-card {
            background: #222;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #333;
        }

        /* MODAL 3D */
        #modal-3d {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #canvas-3d-container {
            width: 95%;
            height: 55%;
            background: #000;
            border-radius: 10px;
        }

        .btn-action {
            background: var(--vale-green);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }

        input {
            padding: 12px;
            background: #121212;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
        }

        .vagon-entry {
            background: #222;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 40px;
            gap: 10px;
        }
    </style>
</head>

<body>

    <div id="screen-home" class="container">
        <center><img src="https://logodownload.org/wp-content/uploads/2014/05/vale-logo-1.png"
                style="width:140px; margin-bottom:10px;"></center>
        <h2 style="text-align: center; color: var(--vale-green);">RailWise - Gestão de Ativos Ferroviários</h2>

        <div class="home-grid">
            <div class="kpi-card">
                <span class="kpi-label">Disponibilidade Física (DF)</span>
                <span class="kpi-value" id="kpi-df">100%</span>
                <p style="font-size: 11px; color: #666;">Frota operacional vs Frota total</p>
            </div>
            <div class="kpi-card">
                <span class="kpi-label">Ativos Monitorados</span>
                <span class="kpi-value" id="kpi-total">0</span>
                <p style="font-size: 11px; color: #666;">Vagões cadastrados no sistema</p>
            </div>
        </div>

        <div class="main-menu">
            <button class="menu-btn" onclick="showScreen('setup')">⚙️ CADASTRAR NOVA FROTA</button>
            <button class="menu-btn" onclick="checkMonitorAccess()">📊 ACESSAR MONITORAMENTO</button>
        </div>
    </div>

    <div id="screen-setup" class="container hidden">
        <button onclick="showScreen('home')"
            style="background:none; border:none; color:var(--vale-gold); cursor:pointer;">
            < VOLTAR</button>
                <h2 style="color: var(--vale-green);">Configuração de Frota</h2>
                <input type="text" id="op-matricula" placeholder="Matrícula do Operador">
                <div id="vagon-list" style="margin-top: 20px;"></div>
                <button onclick="addVagonInput()"
                    style="background:none; color:var(--vale-gold); border:1px dashed var(--vale-gold); width:100%; padding:10px; cursor:pointer; margin-bottom:15px;">+
                    ADICIONAR VAGÃO</button>
                <button class="btn-action" onclick="iniciarMonitoramento()">FINALIZAR E ATIVAR MONITORAMENTO</button>
    </div>

    <div id="screen-monitor" class="container hidden">
        <header
            style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid #333; padding-bottom: 15px;">
            <button onclick="showScreen('home')"
                style="background:none; border:none; color:var(--vale-gold); cursor:pointer;">
                < MENU PRINCIPAL</button>
                    <img src="https://logodownload.org/wp-content/uploads/2014/05/vale-logo-1.png" style="width:70px;">
        </header>
        <div id="wagon-grid" class="wagon-grid"></div>
        <button class="btn-action" style="background:var(--vale-gold); color:#000;" onclick="evoluirFrota()">SIMULAR
            DESGASTE OPERACIONAL</button>
    </div>

    <div id="modal-3d" class="hidden">
        <h2 id="modal-title" style="color:var(--vale-green);">GÊMEO DIGITAL 3D</h2>
        <div id="canvas-3d-container"></div>
        <div
            style="background:#111; padding:20px; width:90%; border-radius:8px; margin-top:10px; display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div>Vibração: <strong id="diag-g">--</strong></div>
            <div>Temp: <strong id="diag-temp">--</strong></div>
            <div>Autonomia: <strong id="diag-km">--</strong></div>
            <div>Status: <strong id="diag-status">--</strong></div>
        </div>
        <button class="btn-action" style="width:200px;" onclick="fechar3D()">VOLTAR</button>
    </div>

    <script>
        let frota = [];
        let scene, camera, renderer, wagonGroup;

        function showScreen(screenId) {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById('screen-' + screenId).classList.remove('hidden');
            updateKPIs();
        }

        function addVagonInput() {
            const container = document.getElementById('vagon-list');
            const div = document.createElement('div');
            div.className = 'vagon-entry';
            div.innerHTML = `
                <input type="text" placeholder="ID" class="v-id">
                <input type="number" placeholder="KM" class="v-km">
                <input type="number" placeholder="Carga" class="v-carga">
                <button onclick="this.parentElement.remove()" style="color:var(--danger); background:none; border:none; cursor:pointer;">X</button>
            `;
            container.appendChild(div);
        }
        addVagonInput();

        function updateKPIs() {
            const total = frota.length;
            const criticos = frota.filter(v => v.desgaste > 75).length;
            const df = total === 0 ? 100 : Math.round(((total - criticos) / total) * 100);

            document.getElementById('kpi-total').innerText = total;
            document.getElementById('kpi-df').innerText = df + "%";
            document.getElementById('kpi-df').style.color = df < 70 ? 'var(--danger)' : (df < 90 ? 'var(--vale-gold)' : 'var(--vale-green)');
        }

        function checkMonitorAccess() {
            if (frota.length === 0) alert("Nenhum vagão cadastrado. Vá em 'Cadastrar Nova Frota'.");
            else showScreen('monitor');
        }

        function iniciarMonitoramento() {
            const entries = document.querySelectorAll('.vagon-entry');
            frota = Array.from(entries).map(e => {
                const km = parseFloat(e.querySelector('.v-km').value) || 0;
                const carga = parseFloat(e.querySelector('.v-carga').value) || 0;
                return {
                    id: e.querySelector('.v-id').value,
                    km: km, carga: carga,
                    desgaste: Math.min(Math.round((km / 120000) * 60 + (carga / 130) * 30), 100)
                };
            }).filter(v => v.id);
            showScreen('home');
        }

        function renderizarCards() {
            const grid = document.getElementById('wagon-grid');
            grid.innerHTML = '';
            frota.forEach((v, i) => {
                let color = v.desgaste > 75 ? 'var(--danger)' : (v.desgaste > 45 ? 'var(--vale-gold)' : 'var(--vale-green)');
                grid.innerHTML += `
                    <div class="wagon-card">
                        <h3>${v.id}</h3>
                        <p>Vida Útil: <strong style="color:${color}">${100 - v.desgaste}%</strong></p>
                        <button class="btn-action" style="padding:10px; font-size:12px;" onclick="abrir3D(${i})">INSPEÇÃO 3D</button>
                    </div>
                `;
            });
        }

        // --- LÓGICA 3D REALISTA (ABREVIADA PARA PERFORMANCE) ---
        function createWagon(desgaste) {
            const group = new THREE.Group();
            const color = desgaste > 75 ? 0x8b0000 : (desgaste > 45 ? 0xcc8400 : 0x2d4a3a);

            const body = new THREE.Mesh(new THREE.BoxGeometry(20, 7, 9), new THREE.MeshPhongMaterial({ color: color }));
            body.position.y = 3.5;
            group.add(body);

            const ore = new THREE.Mesh(new THREE.SphereGeometry(5, 8, 8), new THREE.MeshStandardMaterial({ color: 0x221100 }));
            ore.scale.set(1.5, 0.5, 1); ore.position.y = 7;
            group.add(ore);

            return group;
        }

        function initThree(desgaste) {
            const container = document.getElementById('canvas-3d-container');
            container.innerHTML = '';
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            const wagon = createWagon(desgaste);
            scene.add(wagon);
            scene.add(new THREE.DirectionalLight(0xffffff, 1));
            scene.add(new THREE.AmbientLight(0x404040));
            camera.position.set(25, 20, 25); camera.lookAt(0, 3, 0);

            function animate() {
                requestAnimationFrame(animate);
                wagon.rotation.y += 0.01;
                if (desgaste > 75) wagon.position.x = Math.random() * 0.3;
                renderer.render(scene, camera);
            }
            animate();
        }

        function abrir3D(index) {
            const v = frota[index];
            document.getElementById('modal-3d').classList.remove('hidden');
            document.getElementById('diag-g').innerText = (v.desgaste * 0.08).toFixed(1) + " G";
            document.getElementById('diag-temp').innerText = (25 + v.desgaste * 0.8).toFixed(1) + " °C";
            document.getElementById('diag-km').innerText = Math.max(0, (100 - v.desgaste) * 150) + " KM";
            document.getElementById('diag-status').innerText = v.desgaste > 75 ? "MANUTENÇÃO" : "OK";
            initThree(v.desgaste);
        }

        function fechar3D() { document.getElementById('modal-3d').classList.add('hidden'); }

        function evoluirFrota() {
            frota.forEach(v => v.desgaste = Math.min(v.desgaste + 20, 100));
            renderizarCards();
            updateKPIs();
        }

        // Inicializa KPIs
        updateKPIs();
    </script>
</body>

</html>
